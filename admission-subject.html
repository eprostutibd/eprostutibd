<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিষয়ের বিস্তারিত - eProstutiBD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
        }
        
        body {
            background-color: #f8f9fa;
        }
        
        .subject-header {
            background: linear-gradient(135deg, var(--primary) 0%, #1a252f 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: 30px;
        }
        
        .question-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border-left: 4px solid var(--secondary);
        }
        
        .question-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 15px;
        }
        
        .type-mcq {
            background: rgba(52, 152, 219, 0.1);
            color: var(--secondary);
        }
        
        .type-written {
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent);
        }
        
        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .options-container {
            margin-bottom: 20px;
        }
        
        .option-item {
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ddd;
        }
        
        .option-item.correct {
            background: rgba(39, 174, 96, 0.1);
            border-left-color: #27ae60;
        }
        
        .answer-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #27ae60;
        }
        
        .answer-title {
            font-weight: 600;
            color: #27ae60;
            margin-bottom: 10px;
        }
        
        .filter-buttons {
            margin-bottom: 30px;
        }
        
        .filter-btn {
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .back-btn {
            text-decoration: none;
            color: var(--secondary);
        }
        
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-arrow-left me-2"></i>
                e<span class="text-danger">Prostuti</span>BD
            </a>
        </div>
    </nav>

    <!-- Subject Header -->
    <section class="subject-header">
        <div class="container">
            <a href="index.html" class="back-btn mb-3 d-inline-block">
                <i class="fas fa-arrow-left me-1"></i> সকল বিষয়ে ফিরে যান
            </a>
            <h1 id="subjectName" class="mb-3">বিষয় লোড হচ্ছে...</h1>
            <p id="subjectDescription" class="lead mb-4"></p>
            
            <div class="row">
                <div class="col-md-3 col-6 mb-3">
                    <div class="text-center">
                        <h2 id="mcqCount" class="mb-1">0</h2>
                        <p class="mb-0 opacity-75">MCQ প্রশ্ন</p>
                    </div>
                </div>
                <div class="col-md-3 col-6 mb-3">
                    <div class="text-center">
                        <h2 id="writtenCount" class="mb-1">0</h2>
                        <p class="mb-0 opacity-75">Written প্রশ্ন</p>
                    </div>
                </div>
                <div class="col-md-3 col-6 mb-3">
                    <div class="text-center">
                        <h2 id="totalCount" class="mb-1">0</h2>
                        <p class="mb-0 opacity-75">মোট প্রশ্ন</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters -->
    <div class="container mb-4">
        <div class="filter-buttons">
            <button class="btn btn-outline-primary filter-btn active" data-filter="all">সকল প্রশ্ন</button>
            <button class="btn btn-outline-primary filter-btn" data-filter="mcq">শুধু MCQ</button>
            <button class="btn btn-outline-primary filter-btn" data-filter="written">শুধু Written</button>
            <select class="form-select d-inline-block w-auto filter-btn" id="noteFilter">
                <option value="">সব নোট</option>
            </select>
        </div>
    </div>

    <!-- Questions -->
    <div class="container" id="questionsContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">লোড হচ্ছে...</span>
            </div>
            <p class="mt-3">প্রশ্নগুলো লোড হচ্ছে...</p>
        </div>
    </div>

    <!-- No Questions -->
    <div id="noQuestions" class="container" style="display: none;">
        <div class="text-center py-5">
            <i class="fas fa-question-circle fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">কোনো প্রশ্ন পাওয়া যায়নি</h4>
            <p class="text-muted">এই বিষয়ে এখনো প্রশ্ন যোগ করা হয়নি</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 eProstutiBD - এডমিশন প্রস্তুতির প্লাটফর্ম</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDAwkPaGN08b-vA5S_R6XIus9rEuh7U0pY",
            authDomain: "eprostutibd-9ec31.firebaseapp.com",
            projectId: "eprostutibd-9ec31",
            storageBucket: "eprostutibd-9ec31.firebasestorage.app",
            messagingSenderId: "441646770166",
            appId: "1:441646770166:web:ba244b681de6e6b1bb49d7",
            measurementId: "G-E5XHV46Z6B"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get subject ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const subjectId = urlParams.get('subject');

        if (!subjectId) {
            window.location.href = 'index.html';
        }

        // Global variables
        let subjectData = null;
        let questions = [];
        let filteredQuestions = [];

        // Load subject and questions
        document.addEventListener('DOMContentLoaded', function() {
            loadSubject();
            setupFilters();
        });

        async function loadSubject() {
            try {
                // Load subject details
                const subjectDoc = await db.collection("admission_subjects").doc(subjectId).get();
                
                if (!subjectDoc.exists) {
                    window.location.href = 'index.html';
                    return;
                }
                
                subjectData = subjectDoc.data();
                
                // Update page title and header
                document.title = `${subjectData.name} - eProstutiBD`;
                document.getElementById('subjectName').textContent = subjectData.name;
                
                if (subjectData.description) {
                    document.getElementById('subjectDescription').textContent = subjectData.description;
                }
                
                // Load question counts
                const mcqSnapshot = await db.collection("admission_questions")
                    .where("subjectId", "==", subjectId)
                    .where("type", "==", "mcq")
                    .get();
                
                const writtenSnapshot = await db.collection("admission_questions")
                    .where("subjectId", "==", subjectId)
                    .where("type", "==", "written")
                    .get();
                
                const mcqCount = mcqSnapshot.size;
                const writtenCount = writtenSnapshot.size;
                const totalCount = mcqCount + writtenCount;
                
                document.getElementById('mcqCount').textContent = mcqCount;
                document.getElementById('writtenCount').textContent = writtenCount;
                document.getElementById('totalCount').textContent = totalCount;
                
                // Load all questions
                await loadQuestions();
                
            } catch (error) {
                console.error("Error loading subject:", error);
            }
        }

        async function loadQuestions() {
            try {
                const snapshot = await db.collection("admission_questions")
                    .where("subjectId", "==", subjectId)
                    .orderBy("createdAt", "desc")
                    .get();
                
                questions = [];
                snapshot.forEach(doc => {
                    questions.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                filteredQuestions = [...questions];
                displayQuestions();
                populateNoteFilter();
                
            } catch (error) {
                console.error("Error loading questions:", error);
            }
        }

        function populateNoteFilter() {
            const noteFilter = document.getElementById('noteFilter');
            const notes = new Set();
            
            questions.forEach(question => {
                if (question.note) {
                    notes.add(question.note);
                }
            });
            
            notes.forEach(note => {
                const option = document.createElement('option');
                option.value = note;
                option.textContent = note;
                noteFilter.appendChild(option);
            });
        }

        function setupFilters() {
            // Filter buttons
            document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
                        b.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    const filterType = this.dataset.filter;
                    const noteValue = document.getElementById('noteFilter').value;
                    applyFilters(filterType, noteValue);
                });
            });
            
            // Note filter change
            document.getElementById('noteFilter').addEventListener('change', function() {
                const activeFilter = document.querySelector('.filter-btn[data-filter].active').dataset.filter;
                applyFilters(activeFilter, this.value);
            });
        }

        function applyFilters(type, note) {
            filteredQuestions = questions.filter(question => {
                // Filter by type
                if (type !== 'all' && question.type !== type) {
                    return false;
                }
                
                // Filter by note
                if (note && question.note !== note) {
                    return false;
                }
                
                return true;
            });
            
            displayQuestions();
        }

        function displayQuestions() {
            const container = document.getElementById('questionsContainer');
            const noQuestions = document.getElementById('noQuestions');
            
            if (filteredQuestions.length === 0) {
                container.style.display = 'none';
                noQuestions.style.display = 'block';
                return;
            }
            
            container.style.display = 'block';
            noQuestions.style.display = 'none';
            
            let html = '';
            
            filteredQuestions.forEach(question => {
                if (question.type === 'mcq') {
                    html += createMcqQuestion(question);
                } else {
                    html += createWrittenQuestion(question);
                }
            });
            
            container.innerHTML = html;
        }

        function createMcqQuestion(question) {
            const options = question.options || {};
            const correctAnswer = question.answer || '';
            
            let optionsHtml = '';
            Object.entries(options).forEach(([key, value]) => {
                const isCorrect = key === correctAnswer.toString();
                optionsHtml += `
                    <div class="option-item ${isCorrect ? 'correct' : ''}">
                        <strong>${key}:</strong> ${value}
                    </div>
                `;
            });
            
            return `
                <div class="question-card">
                    <div class="question-type type-mcq">MCQ প্রশ্ন</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options-container">
                        ${optionsHtml}
                    </div>
                    ${question.note ? `
                        <div class="text-muted small">
                            <i class="fas fa-sticky-note me-1"></i> ${question.note}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function createWrittenQuestion(question) {
            return `
                <div class="question-card">
                    <div class="question-type type-written">Written প্রশ্ন</div>
                    <div class="question-text">${question.question}</div>
                    <div class="answer-section">
                        <div class="answer-title">উত্তর:</div>
                        <div>${question.answer || ''}</div>
                    </div>
                    ${question.note ? `
                        <div class="text-muted small mt-3">
                            <i class="fas fa-sticky-note me-1"></i> ${question.note}
                        </div>
                    ` : ''}
                </div>
            `;
        }
    </script>
</body>
</html>
