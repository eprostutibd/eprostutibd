<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">বিষয় বিস্তারিত - eProstutiBD</title>
    <!-- Same CSS and meta tags as above -->
</head>
<body>
    <!-- Same header and navigation as above -->
    
    <!-- Subject Details Content -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/">হোম</a></li>
                        <li class="breadcrumb-item"><a href="/subjects">সকল বিষয়</a></li>
                        <li class="breadcrumb-item active" id="currentSubject">বিষয়</li>
                    </ol>
                </nav>
            </div>
        </div>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-body">
                        <h1 id="subjectTitle" class="mb-3"></h1>
                        <p id="subjectDescription" class="text-muted"></p>
                        
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <div class="card stat-card bg-light">
                                    <div class="card-body text-center">
                                        <h3 id="mcqCount">0</h3>
                                        <p class="text-muted mb-0">MCQ প্রশ্ন</p>
                                        <button class="btn btn-primary btn-sm mt-2" id="viewMCQBtn">
                                            MCQ প্রশ্ন দেখুন
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card stat-card bg-light">
                                    <div class="card-body text-center">
                                        <h3 id="writtenCount">0</h3>
                                        <p class="text-muted mb-0">Written প্রশ্ন</p>
                                        <button class="btn btn-warning btn-sm mt-2" id="viewWrittenBtn">
                                            Written প্রশ্ন দেখুন
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Questions will be loaded here -->
                <div id="questionsContainer"></div>
            </div>
            
            <div class="col-lg-4">
                <!-- Sidebar with related subjects -->
                <div id="relatedSubjects"></div>
                
                <!-- Ads -->
                <div class="ads-container">
                    <div class="ads-label">Advertisement</div>
                    <!-- Ad code here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Same footer as above -->
    
    <script>
        // Firebase config and initialization
        
        // Get subject ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const subjectId = urlParams.get('subject');
        
        // Load subject details and questions
        async function loadSubjectDetails() {
            if (!subjectId) {
                window.location.href = '/';
                return;
            }
            
            // Load subject info
            const subjectDoc = await db.collection("admission_subjects").doc(subjectId).get();
            if (!subjectDoc.exists) {
                window.location.href = '/';
                return;
            }
            
            const subjectData = subjectDoc.data();
            
            // Update page title and headings
            document.getElementById('pageTitle').textContent = `${subjectData.name} - eProstutiBD`;
            document.getElementById('subjectTitle').textContent = subjectData.name;
            document.getElementById('subjectDescription').textContent = subjectData.description || `${subjectData.name} বিষয়ের সকল প্রশ্নের সংগ্রহ`;
            document.getElementById('currentSubject').textContent = subjectData.name;
            
            // Load questions for this subject
            loadSubjectQuestions(subjectId, subjectData.name);
            
            // Load related subjects
            loadRelatedSubjects(subjectId);
        }
        
        // Rest of the JavaScript for loading questions, etc.
    </script>
</body>
</html>
